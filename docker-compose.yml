services:
  gpt-adminmail:
    image: ghcr.io/bernardteske/gpt-adminmail:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_TLS: ${EMAIL_TLS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      MAILTO: ${MAILTO}
    command: ["pm2-runtime", "start", "ecosystem.config.js"]
